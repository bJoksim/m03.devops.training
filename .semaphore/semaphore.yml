version: v1.0
name: "\U0001F31F Fan-In/Fan-Out Pipeline"
agent:
  machine:
    type: a2-standard-4
    os_image: macos-xcode26
  containers:
    - name: main
      image: 'registry.semaphoreci.com/node:20'
    - name: postgres
      image: 'registry.semaphoreci.com/postgres:17'
    - name: redis
      image: 'registry.semaphoreci.com/redis:7.0'
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F6E0️ Setup"
    dependencies: []
    task:
      jobs:
        - name: "\U0001F4E6 Install Dependencies"
          commands:
            - echo "Checking out code..."
            - echo "Installing project dependencies..."
            - echo "Setup completed successfully!"
  - name: "\U0001F9EA Unit Tests"
    dependencies:
      - "\U0001F6E0️ Setup"
    task:
      jobs:
        - name: "\U0001F7E2 Run Unit Tests"
          commands:
            - echo "Running unit tests in container..."
            - echo "Unit tests passed successfully!"
  - name: "\U0001F50D Integration Tests"
    dependencies:
      - "\U0001F6E0️ Setup"
    task:
      env_vars:
        - name: DATABASE_URL
          value: 'postgresql://postgres@postgres:5432/test_db'
        - name: REDIS_URL
          value: 'redis://redis:6379'
      jobs:
        - name: "\U0001F504 Run Integration Tests"
          commands:
            - echo "Setting up test database..."
            - echo "Running integration tests with PostgreSQL..."
            - echo "Running cache tests with Redis..."
            - echo "Integration tests passed successfully!"
  - name: "\U0001F310 E2E Tests"
    dependencies:
      - "\U0001F6E0️ Setup"
    task:
      jobs:
        - name: "\U0001F3AD Run E2E Tests"
          commands:
            - echo "Starting containerized environment..."
            - echo "Running end-to-end tests..."
            - echo "E2E tests passed successfully!"
  - name: ✨ Code Quality
    dependencies:
      - "\U0001F6E0️ Setup"
    task:
      jobs:
        - name: "\U0001F50D Lint"
          commands:
            - echo "Running code linting in container..."
            - echo "Linting passed successfully!"
        - name: "\U0001F4CA Type Check"
          commands:
            - echo "Running type checks in container..."
            - echo "Type checking passed successfully!"
  - name: "\U0001F510 Security"
    dependencies:
      - "\U0001F6E0️ Setup"
    task:
      jobs:
        - name: "\U0001F6E1️ Security Scan"
          commands:
            - echo "Scanning container dependencies..."
            - echo "Running container security checks..."
            - echo "Security scan completed successfully!"
  - name: "\U0001F4E6 Build"
    dependencies:
      - "\U0001F9EA Unit Tests"
      - "\U0001F50D Integration Tests"
      - "\U0001F310 E2E Tests"
      - ✨ Code Quality
      - "\U0001F510 Security"
    task:
      jobs:
        - name: "\U0001F528 Build Production"
          commands:
            - echo "Building production Docker image..."
            - echo "Running multi-stage build..."
            - echo "Build completed successfully!"
  - name: "\U0001F433 Docker"
    dependencies:
      - "\U0001F4E6 Build"
    task:
      jobs:
        - name: "\U0001F4E6 Build and Push"
          commands:
            - echo "Logging into Docker registry..."
            - echo "Pushing production image..."
            - echo "Docker image published successfully!"
  - name: "\U0001F680 Deploy"
    dependencies:
      - "\U0001F433 Docker"
    task:
      jobs:
        - name: "\U0001F30D Deploy to Production"
          commands:
            - echo "Configuring deployment credentials..."
            - echo "Updating container service..."
            - echo "Rolling out new containers..."
            - echo "Deployment completed successfully!"
