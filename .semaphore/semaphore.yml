version: v1.0
name: CI Pipeline
agent:
  machine:
    type: a2-standard-4
    os_image: macos-xcode26
  containers:
    - name: main
      image: 'registry.semaphoreci.com/node:20'
    - name: postgres
      image: 'registry.semaphoreci.com/postgres:17'
    - name: redis
      image: 'registry.semaphoreci.com/redis:7.0'
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: Code signing
    dependencies: []
    task:
      jobs:
        - name: sign
          commands:
            - gpg --import /root/public.key
            - gpg --import /root/private.key
            - gpg --output artifact.txt.sig --detach-sign 1-signing/artifact.txt
            - artifact push job artifact.txt.sig
        - name: verify
          commands:
            - gpg --import /root/public.key
            - gpg --import /root/private.key
            - gpg --verify artifact.txt.sig artifact.txt
      secrets:
        - name: keys
      prologue:
        commands:
          - checkout
  - name: SBOM
    dependencies:
      - Code signing
    task:
      jobs:
        - name: Cyclonedx
          commands:
            - checkout
            - pip install cyclonedx-bom
            - cyclonedx-py 2-sbom/requirements -o bom.json
            - artifact push project bom.json
  - name: Audit dependencies
    dependencies:
      - SBOM
    task:
      jobs:
        - name: pip audit
          commands:
            - checkout
            - pip install pip-audit
            - pip-audit -r 3-dependancy-scanning/requirements.txt
  - name: SAST Scan
    dependencies:
      - Audit dependencies
    task:
      jobs:
        - name: Bandit
          commands:
            - checkout
            - pip install bandit
            - bandit -r 4-sast/vulnerable_script.py
  - name: DAST Scan
    dependencies:
      - SAST Scan
    task:
      jobs:
        - name: wapiti
          commands:
            - checkout
            - pip install -r 5-dast/requirements.txt
            - pip install wapiti3
            - 'gunicorn -b 0.0.0.0:4000 app:app --daemon'
            - 'wapiti -u http://localhost:4000 -f html'
            - artifact push project /root/.wapiti/generated_report
